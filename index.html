<body class="bg-zinc-950 text-gray-100">
    <noscript>
        Este portfólio utiliza JavaScript para exibir o conteúdo. Por favor, habilite JavaScript no seu navegador para visualizar o site corretamente.
    </noscript>
    <div id="root"></div>

    <!-- Dados e constantes (JavaScript puro, sem JSX) -->
    <script src="js/constants.js"></script>
    <script src="js/data/projects.js"></script>
    <script src="js/data/certifications.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/data/experiences.js"></script>

    <!-- Carregamento dos componentes React via fetch+eval (compatível com Babel standalone) -->
    <script type="text/babel">
        async function loadAllModules() {
            const modules = [
                'js/components/Header.js',
                'js/components/Footer.js',
                'js/components/ProjectDetailTemplate.js',
                'js/sections/Hero.js',
                'js/sections/About.js',
                'js/sections/Skills.js',
                'js/sections/Experience.js',
                'js/sections/Certifications.js',
                'js/sections/Contact.js',
                'js/pages/HomePage.js',
                'js/pages/ProjectsPage.js',
                'js/pages/CertificationsPage.js',
                'js/projects/FeminicidiosBrasilPipelineProject.js',
                'js/projects/CovidMisinfoDetectorProject.js',
                'js/projects/SaudePublicaProject.js',
                'js/projects/PopulacaoRuaBHProject.js',
                'js/projects/LeidenRankingAnalysisProject.js',
                'js/projects/HandsetsCensusProject.js',
                'js/projects/TwitchDataPipelineProject.js',
                'js/projects/ApiIbgeProject.js',
                'js/app.js'
            ];

            try {
                const loadedCode = await Promise.all(
                    modules.map(url =>
                        fetch(url).then(r => {
                            if (!r.ok) throw new Error('Falha ao carregar ' + url + ': ' + r.status);
                            return r.text();
                        })
                    )
                );

                const fullCode = loadedCode.join('\n\n');
                eval(Babel.transform(fullCode, { presets: ['react'] }).code);
            } catch (err) {
                console.error('Erro ao carregar módulos:', err);
                document.getElementById('root').innerHTML =
                    '<div style="color:#f87171;padding:2rem;font-family:monospace">Erro ao carregar o portfólio: ' + err.message + '</div>';
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadAllModules);
        } else {
            loadAllModules();
        }
    </script>
</body>
</html>
