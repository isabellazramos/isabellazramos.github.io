<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella Ramos | Engenheira de Dados</title>
    <meta name="description" content="Portfólio de Isabella Ramos - Engenheira de Dados especializada em pipelines escaláveis, dbt, Apache Airflow e BigQuery">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#10b981',
                        'primary-dark': '#059669',
                        'secondary': '#14b8a6',
                        'accent': '#06b6d4',
                    }
                }
            }
        };
    </script>
    
    <!-- Estilos customizados -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-zinc-950 text-gray-100">
    <div id="root"></div>

    <!-- Constantes -->
    <script src="js/constants.js"></script>
    
    <!-- Dados -->
    <script src="js/data/projects.js"></script>
    <script src="js/data/certifications.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/data/experiences.js"></script>
    
    <!-- Componentes -->
    <script type="text/babel" src="js/components/Header.js"></script>
    <script type="text/babel" src="js/components/Footer.js"></script>
    
    <!-- Seções -->
    <script type="text/babel" src="js/sections/Hero.js"></script>
    <script type="text/babel" src="js/sections/About.js"></script>
    <script type="text/babel" src="js/sections/Skills.js"></script>
    <script type="text/babel" src="js/sections/Experience.js"></script>
    <script type="text/babel" src="js/sections/Certifications.js"></script>
    <script type="text/babel" src="js/sections/Contact.js"></script>
    
    <!-- Páginas -->
    <script type="text/babel" src="js/pages/HomePage.js"></script>
    <script type="text/babel" src="js/pages/ProjectsPage.js"></script>
    <script type="text/babel" src="js/pages/ProjectDetail.js"></script>
    
    <!-- App Principal -->
    <script type="text/babel" src="js/app.js"></script>
</body>
</html>
