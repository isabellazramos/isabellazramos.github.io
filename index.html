<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella Ramos | Engenheira de Dados</title>
    <meta name="description" content="Portfólio de Isabella Ramos - Engenheira de Dados especializada em pipelines escaláveis, dbt, Apache Airflow e BigQuery">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        /* Força dark mode em todo documento */
        html {
            background-color: #09090b;
            scroll-behavior: smooth;
        }
        
        body {
            background-color: #09090b;
            color: #f4f4f5;
            margin: 0;
            padding: 0;
        }

        * {
            font-family: 'Inter', sans-serif;
        }

        #root {
            background-color: #09090b;
            min-height: 100vh;
        }

        .gradient-text {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% {
                background: linear-gradient(135deg, #10b981, #14b8a6);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            50% {
                background: linear-gradient(135deg, #14b8a6, #06b6d4);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }

        .hover-scale {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-scale:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.15);
        }

        .project-card {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .project-card:hover {
            border-color: #10b981;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }

        .filter-btn {
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: white;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glow-effect {
            position: relative;
            overflow: hidden;
        }

        .glow-effect::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            animation: glow-pulse 4s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-gray-100">
    <div id="root"></div>

    <!-- constants and raw data load normally -->
    <script src="js/constants.js"></script>
    <script src="js/data/projects.js"></script>
    <script src="js/data/certifications.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/data/experiences.js"></script>

    <!-- dynamic loader, compiles components/pages with Babel -->
    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        async function loadAllModules() {
            console.log('loadAllModules start');
            const modules = [
                'js/components/Header.js',
                'js/components/Footer.js',
                'js/sections/Hero.js',
                'js/sections/About.js',
                'js/sections/Skills.js',
                'js/sections/Experience.js',
                'js/sections/Certifications.js',
                'js/sections/Contact.js',
                'js/pages/HomePage.js',
                'js/pages/ProjectsPage.js',
                'js/pages/ProjectDetail.js'
            ];

            let loadedCode;
            try {
                loadedCode = await Promise.all(
                    modules.map(url => fetch(url).then(r => {
                        if (!r.ok) throw new Error(`failed fetch ${url}: ${r.status}`);
                        return r.text();
                    }))
                );
            } catch (e) {
                console.error('error fetching modules', e);
                return;
            }

            try {
                // join modules and transpile JSX using Babel before evaluating
                const joined = loadedCode.join('\n\n');
                console.log('joined code length', joined.length);
                const transpiled = Babel.transform(joined, { presets: ['react'] }).code;
                console.log('transpiled length', transpiled.length);
                // use global eval so component declarations land on window
                window.eval(transpiled);
                console.log('Header after eval', typeof Header);
            } catch (e) {
                console.error('error evaluating modules', e);
            }
            // after eval we can define App and render
            function App() {
                const [currentPage, setCurrentPage] = useState(PAGES.HOME);
                const [selectedProject, setSelectedProject] = useState(null);

                const renderPage = () => {
                    switch (currentPage) {
                        case PAGES.HOME:
                            return React.createElement(HomePage);
                        case PAGES.PROJECTS:
                            return React.createElement(ProjectsPage, { 
                                setCurrentPage, 
                                setSelectedProject 
                            });
                        case PAGES.PROJECT_DETAIL:
                            return selectedProject ? React.createElement(ProjectDetail, { project: selectedProject }) : null;
                        default:
                            return null;
                    }
                };

                return React.createElement('div', { className: 'min-h-screen bg-zinc-950' },
                    React.createElement(Header, { currentPage, setCurrentPage }),
                    renderPage(),
                    React.createElement(Footer)
                );
            }

            ReactDOM.render(
                React.createElement(App),
                document.getElementById('root')
            );
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadAllModules);
        } else {
            loadAllModules();
        }
    </script>
</body>
</html>
