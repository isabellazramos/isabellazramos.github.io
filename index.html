<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella Ramos | Engenheira de Dados</title>
    <meta name="description" content="Portfólio de Isabella Ramos - Engenheira de Dados especializada em pipelines escaláveis, dbt, Apache Airflow e BigQuery">
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#10b981',
                        'primary-dark': '#059669',
                        'secondary': '#14b8a6',
                        'accent': '#06b6d4',
                    }
                }
            }
        };
    </script>
    
    <!-- Estilos customizados -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-zinc-950 text-gray-100">
    <div id="root"></div>

    <!-- Carregar todos os scripts em ordem -->
    <script src="js/constants.js"></script>
    <script src="js/data/projects.js"></script>
    <script src="js/data/certifications.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/data/experiences.js"></script>

    <!-- Componentes e páginas com Babel -->
    <script type="text/babel" data-type="module">
        // Carregar e executar todos os componentes inline
        Promise.all([
            fetch('js/components/Header.js').then(r => r.text()),
            fetch('js/components/Footer.js').then(r => r.text()),
            fetch('js/sections/Hero.js').then(r => r.text()),
            fetch('js/sections/About.js').then(r => r.text()),
            fetch('js/sections/Skills.js').then(r => r.text()),
            fetch('js/sections/Experience.js').then(r => r.text()),
            fetch('js/sections/Certifications.js').then(r => r.text()),
            fetch('js/sections/Contact.js').then(r => r.text()),
            fetch('js/pages/HomePage.js').then(r => r.text()),
            fetch('js/pages/ProjectsPage.js').then(r => r.text()),
            fetch('js/pages/ProjectDetail.js').then(r => r.text()),
            fetch('js/app.js').then(r => r.text())
        ]).then(scripts => {
            // Executar todos os scripts
            scripts.forEach(script => {
                eval(Babel.transform(script, { presets: ['react'] }).code);
            });
        });
    </script>
</body>
</html>
