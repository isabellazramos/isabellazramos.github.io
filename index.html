<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella Ramos | Engenheira de Dados</title>
    <meta name="description" content="Portfólio de Isabella Ramos - Engenheira de Dados especializada em pipelines escaláveis, dbt, Apache Airflow e BigQuery">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/styles.css">

    <!-- React, Babel e Tailwind via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
</head>
<body class="bg-zinc-950 text-gray-100">
    <div id="root"></div>

    <!-- Constantes e dados em JavaScript puro -->
    <script src="js/constants.js"></script>
    <script src="js/data/projects.js"></script>
    <script src="js/data/certifications.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/data/experiences.js"></script>

    <!-- Loader único que busca, transpila (JSX) e executa os módulos React -->
    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        async function loadAllModules() {
            const modules = [
                'js/components/Header.js',
                'js/components/Footer.js',
                'js/components/ProjectDetailTemplate.js',
                'js/sections/Hero.js',
                'js/sections/About.js',
                'js/sections/Skills.js',
                'js/sections/Experience.js',
                'js/sections/Certifications.js',
                'js/sections/Contact.js',
                'js/pages/HomePage.js',
                'js/pages/ProjectsPage.js',
                'js/projects/CovidMisinfoDetectorProject.js',
                'js/projects/SaudePublicaProject.js',
                'js/projects/PopulacaoRuaBHProject.js',
                'js/projects/LeidenRankingAnalysisProject.js',
                'js/projects/HandsetsCensusProject.js',
                'js/projects/TwitchDataPipelineProject.js',
                'js/projects/ApiIbgeProject.js',
                'js/app.js'
            ];

            let loadedCode;
            try {
                loadedCode = await Promise.all(
                    modules.map(url => fetch(url).then(r => {
                        if (!r.ok) throw new Error(`failed fetch ${url}: ${r.status}`);
                        return r.text();
                    }))
                );
            } catch (e) {
                console.error('error fetching modules', e);
                return;
            }

            try {
                const joined = loadedCode.join('\n\n');
                const transpiled = Babel.transform(joined, { presets: ['react'] }).code;
                window.eval(transpiled);
            } catch (e) {
                console.error('error evaluating modules', e);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadAllModules);
        } else {
            loadAllModules();
        }
    </script>
</body>
</html>
