        function NavigationLink({ item, onClick, currentPage, setCurrentPage }) {
            const handleClick = (e) => {
                if (item.action) {
                    // Botão de ação (ex: Projetos)
                    e.preventDefault();
                    setCurrentPage(item.action);
                    window.scrollTo(0, 0);
                } else if (item.href && item.href.startsWith('#')) {
                    // Link de âncora
                    e.preventDefault();
                    
                    // Se não estiver na HOME, volta primeiro
                    if (currentPage !== PAGES.HOME) {
                        setCurrentPage(PAGES.HOME);
                        // Aguarda renderizar a HOME e depois rola
                        setTimeout(() => {
                            const element = document.querySelector(item.href);
                            if (element) {
                                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        }, 100);
                    } else {
                        // Já está na HOME, apenas rola
                        const element = document.querySelector(item.href);
                        if (element) {
                            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }
                }
            };

            if (item.action) {
                return (
                    <button 
                        onClick={handleClick}
                        className="text-gray-400 hover:text-emerald-500 transition-colors"
                    >
                        {item.label}
                    </button>
                );
            }

            return (
                <a 
                    href={item.href}
                    onClick={handleClick}
                    className="text-gray-400 hover:text-emerald-500 transition-colors"
                >
                    {item.label}
                </a>
            );
        }

        function SkillCard({ skill }) {
            return (
                <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-6 hover:border-emerald-500 transition-all hover-scale">
                    <h3 className="text-xl font-semibold mb-4 text-emerald-500">{skill.title}</h3>
                    <div className="flex flex-wrap gap-2">
                        {skill.tags.map((tag, i) => (
                            <span key={i} className="px-3 py-1 bg-zinc-800 rounded-md text-sm text-gray-400">
                                {tag}
                            </span>
                        ))}
                    </div>
                </div>
            );
        }

        function Skills() {
            return (
                <section id="skills" className="py-20 px-6">
                    <h2 className="text-5xl font-bold text-center mb-16 bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">
                        Competências Técnicas
                    </h2>
                    <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {SKILLS_DATA.map((skill, idx) => (
                            <SkillCard key={idx} skill={skill} />
                        ))}
                    </div>
                </section>
            );
        }

        function ExperienceCard({ experience }) {
            const dotClasses = `absolute left-0 top-2 w-8 h-8 rounded-full border-4 flex items-center justify-center ${
                experience.current 
                    ? 'bg-emerald-500 border-emerald-500 shadow-lg shadow-emerald-500/50' 
                    : 'bg-zinc-900 border-emerald-500/50'
            }`;

            const cardClasses = `bg-zinc-900 border rounded-xl p-6 hover:border-emerald-500 transition-all hover-scale ${
                experience.current ? 'border-emerald-500/50' : 'border-zinc-800'
            }`;

            return (
                <div className="relative pl-12 pb-12 last:pb-0">
                    <div className={dotClasses}>
                        {experience.current && (
                            <span className="w-3 h-3 bg-white rounded-full animate-pulse"></span>
                        )}
                    </div>

                    <div className={cardClasses}>
                        {experience.current && (
                            <div className="inline-flex items-center gap-2 px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs font-medium rounded-full mb-3 border border-emerald-500/30">
                                <span className="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                                Atual
                            </div>
                        )}
                        
                        <h3 className="text-xl font-bold mb-1 text-gray-100">{experience.title}</h3>
                        
                        <div className="flex flex-wrap items-center gap-x-4 gap-y-1 text-sm text-gray-500 mb-4">
                            <span className="flex items-center gap-1">
                                <span className="text-emerald-400">💼</span>
                                {experience.company}
                            </span>
                            <span className="flex items-center gap-1">
                                <span className="text-emerald-400">📍</span>
                                {experience.location}
                            </span>
                            <span className="flex items-center gap-1">
                                <span className="text-emerald-400">📅</span>
                                {experience.period}
                            </span>
                        </div>

                        <ul className="space-y-2">
                            {experience.description.map((item, i) => (
                                <li key={i} className="flex items-start gap-2 text-sm text-gray-400">
                                    <span className="text-emerald-400 mt-1">▹</span>
                                    <span>{item}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        }

        function Experience() {
            return (
                <section id="experiencia" className="py-20 px-6 bg-zinc-900/30">
                    <h2 className="text-5xl font-bold text-center mb-16 bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">
                        Experiência Profissional
                    </h2>
                    <div className="max-w-4xl mx-auto relative">
                        <div className="absolute left-4 top-0 bottom-0 w-0.5 bg-gradient-to-b from-emerald-500 via-emerald-500/50 to-transparent"></div>
                        {EXPERIENCES_DATA.map((exp, idx) => (
                            <ExperienceCard key={idx} experience={exp} />
                        ))}
                    </div>
                </section>
            );
        }

        function CertificationCard({ certification }) {
            return (
                <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-5 hover:border-emerald-500 hover-scale hover:shadow-emerald-500/20 hover:shadow-lg">
                    <h3 className="text-base font-semibold mb-2 bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">
                        {certification.title}
                    </h3>
                    <p className="text-gray-500 text-xs mb-1">{certification.provider}</p>
                    <p className="text-gray-600 text-xs">{certification.date}</p>
                    <span className="inline-block mt-3 px-3 py-1 bg-emerald-500/10 border border-emerald-500/30 rounded-md text-xs text-emerald-400">
                        {certification.category}
                    </span>
                </div>
            );
        }

        function Certifications() {
            const [filter, setFilter] = useState('Todas');
            const categories = ['Todas', 'Big Data', 'Data Engineering', 'AI/ML', 'Cloud', 'Programming'];

            const filteredCerts = filter === 'Todas' 
                ? CERTIFICATIONS_DATA 
                : CERTIFICATIONS_DATA.filter(cert => cert.category === filter);

            return (
                <section id="certificacoes" className="py-20 px-6">
                    <h2 className="text-5xl font-bold text-center mb-8 bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">
                        Certificações
                    </h2>
                    
                    <div className="flex justify-center gap-3 mb-12 flex-wrap">
                        {categories.map(cat => (
                            <button
                                key={cat}
                                onClick={() => setFilter(cat)}
                                className={`filter-btn px-4 py-2 rounded-lg border ${
                                    filter === cat 
                                        ? 'active' 
                                        : 'bg-zinc-800 border-zinc-700 text-gray-400 hover:border-emerald-500'
                                }`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        {filteredCerts.map((cert, idx) => (
                            <CertificationCard key={idx} certification={cert} />
                        ))}
                    </div>
                </section>
            );
        }

        function Contact() {
            const contactButtons = [
                { href: `mailto:${CONTACT_LINKS.EMAIL}`, label: '📧 Email', primary: true },
                { href: CONTACT_LINKS.LINKEDIN, label: '💼 LinkedIn', primary: false },
                { href: CONTACT_LINKS.GITHUB, label: '🐙 GitHub', primary: false }
            ];

            return (
                <section id="contato" className="py-20 px-6">
                    <h2 className="text-5xl font-bold text-center mb-16 bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">
                        Vamos Conversar?
                    </h2>
                    <div className="max-w-2xl mx-auto bg-zinc-900 border border-zinc-800 rounded-xl p-12 text-center">
                        <h3 className="text-2xl font-semibold mb-4 bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">
                            Entre em contato
                        </h3>
                        <p className="text-gray-400 mb-8">
                            Estou sempre aberta a novas oportunidades e colaborações em projetos de dados.
                        </p>
                        <div className="flex justify-center gap-4 flex-wrap">
                            {contactButtons.map((btn, idx) => (
                                <a 
                                    key={idx}
                                    href={btn.href}
                                    target={btn.href.startsWith('http') ? '_blank' : undefined}
                                    rel={btn.href.startsWith('http') ? 'noopener noreferrer' : undefined}
                                    className={btn.primary 
                                        ? 'px-6 py-3 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 rounded-lg font-semibold transition-all hover-scale flex items-center gap-2'
                                        : 'px-6 py-3 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-emerald-500 rounded-lg font-semibold transition-all hover-scale flex items-center gap-2'
                                    }
                                >
                                    {btn.label}
                                </a>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        function Footer() {
            return (
                <footer className="py-8 px-6 border-t border-zinc-800">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                        <p className="text-gray-500 text-sm">
                            © 2026 Isabella Ramos. Todos os direitos reservados.
                        </p>
                        <div className="flex gap-6">
                            <a href={CONTACT_LINKS.GITHUB} target="_blank" rel="noopener noreferrer" className="text-gray-500 hover:text-emerald-500 transition-colors">
                                GitHub
                            </a>
                            <a href={CONTACT_LINKS.LINKEDIN} target="_blank" rel="noopener noreferrer" className="text-gray-500 hover:text-emerald-500 transition-colors">
                                LinkedIn
                            </a>
                            <a href={`mailto:${CONTACT_LINKS.EMAIL}`} className="text-gray-500 hover:text-emerald-500 transition-colors">
                                Email
                            </a>
                        </div>
                    </div>
                </footer>
            );
        }

        // ==================== PÁGINAS ====================

        function ProjectCard({ project, onClick }) {
            return (
                <div
                    onClick={() => onClick(project)}
                    className="project-card bg-zinc-900 border border-zinc-800 rounded-xl p-6 hover-scale hover:border-emerald-500"
                >
                    <h3 className="text-xl font-semibold mb-3 text-emerald-400">{project.title}</h3>
                    <p className="text-gray-400 mb-4 leading-relaxed">{project.shortDesc}</p>
                    <div className="flex flex-wrap gap-2">
                        {project.tags.map((tag, i) => (
                            <span key={i} className="px-3 py-1 bg-emerald-500/10 border border-emerald-500/30 rounded-md text-sm text-emerald-400">
                                {tag}
                            </span>
                        ))}
                    </div>
                </div>
            );
        }

        function ProjectsPage({ setCurrentPage, setSelectedProject }) {
            const handleProjectClick = (project) => {
                setSelectedProject(project);
                setCurrentPage(PAGES.PROJECT_DETAIL);
                window.scrollTo(0, 0);
            };

            return (
                <div className="pt-32 pb-20 px-6 fade-in">
                    <h1 className="text-6xl font-bold text-center mb-8 bg-gradient-to-r from-emerald-500 to-teal-500 bg-clip-text text-transparent">
                        Meus Projetos
                    </h1>
                    <p className="text-center text-gray-400 mb-16 text-xl max-w-3xl mx-auto">
                        Portfólio completo de projetos de engenharia de dados. Clique em qualquer projeto para ver os detalhes técnicos, desafios e resultados.
                    </p>
                    <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {PROJECTS_DATA.map((project, idx) => (
                            <ProjectCard key={idx} project={project} onClick={handleProjectClick} />
                        ))}
                    </div>
                </div>
            );
        }

        function ProjectSection({ title, emoji, children }) {
            return (
                <section>
                    <h2 className="text-3xl font-bold mb-4 text-emerald-400">{emoji} {title}</h2>
                    {children}
                </section>
            );
        }

        function ProjectDetail({ project }) {
            return (
                <div className="pt-32 pb-20 px-6 max-w-5xl mx-auto">
                    <h1 className="text-5xl font-bold mb-6">{project.title}</h1>
                    
                    <div className="flex flex-wrap gap-2 mb-8">
                        {project.tech.map((tech, i) => (
                            <span key={i} className="px-4 py-2 bg-emerald-600 rounded-lg text-sm font-medium">
                                {tech}
                            </span>
                        ))}
                    </div>

                    <div className="space-y-12">
                        <ProjectSection title="Descrição" emoji="📋">
                            <p className="text-gray-300 text-lg leading-relaxed">{project.fullDescription}</p>
                        </ProjectSection>

                        <ProjectSection title="Desafios" emoji="🎯">
                            <ul className="space-y-3">
                                {project.challenges.map((challenge, i) => (
                                    <li key={i} className="flex items-start gap-3">
                                        <span className="text-emerald-500 text-xl mt-1">•</span>
                                        <span className="text-gray-300 text-lg">{challenge}</span>
                                    </li>
                                ))}
                            </ul>
                        </ProjectSection>

                        <ProjectSection title="Soluções Implementadas" emoji="💡">
                            <ul className="space-y-3">
                                {project.solutions.map((solution, i) => (
                                    <li key={i} className="flex items-start gap-3">
                                        <span className="text-green-500 text-xl mt-1">✓</span>
                                        <span className="text-gray-300 text-lg">{solution}</span>
                                    </li>
                                ))}
                            </ul>
                        </ProjectSection>

                        <ProjectSection title="Resultados" emoji="📊">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {project.results.map((result, i) => (
                                    <div key={i} className="bg-zinc-900 border border-zinc-800 rounded-xl p-6">
                                        <p className="text-gray-300 text-lg">{result}</p>
                                    </div>
                                ))}
                            </div>
                        </ProjectSection>

                        <section className="border-t border-zinc-800 pt-8">
                            <a 
                                href={project.github}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="inline-flex items-center gap-2 px-8 py-4 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 rounded-lg text-lg font-semibold transition-all hover-scale shadow-lg shadow-emerald-500/30"
                            >
                                Ver no GitHub →
                            </a>
                        </section>
                    </div>
                </div>
            );
        }

        // ==================== APP PRINCIPAL ====================

        function App() {
            const [currentPage, setCurrentPage] = useState(PAGES.HOME);
            const [selectedProject, setSelectedProject] = useState(null);

            const renderPage = () => {
                switch (currentPage) {
                    case PAGES.HOME:
                        return (
                            <>
                                <Hero />
                                <About />
                                <Experience />
                                <Certifications />
                                <Skills />
                                <Contact />
                            </>
                        );
                    case PAGES.PROJECTS:
                        return (
                            <ProjectsPage 
                                setCurrentPage={setCurrentPage} 
                                setSelectedProject={setSelectedProject}
                            />
                        );
                    case PAGES.PROJECT_DETAIL:
                        return selectedProject ? <ProjectDetail project={selectedProject} /> : null;
                    default:
                        return null;
                }
            };

            return (
                <div className="min-h-screen bg-zinc-950">
                    <Header currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    {renderPage()}
                    <Footer />
                </div>
            );
        }

        // ==================== RENDERIZAÇÃO ====================
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
